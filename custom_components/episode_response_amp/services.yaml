set_dsp_preset:
  name: Set DSP Preset
  description: Set the DSP sound preset for a specific zone.
  fields:
    entry_id:
      name: Config Entry ID
      description: The config entry ID of the amplifier (optional if only one amp).
      required: false
      selector:
        text:
    zone:
      name: Zone
      description: Zone index (0-5).
      required: true
      selector:
        number:
          min: 0
          max: 5
          mode: box
    preset:
      name: Preset
      description: "DSP preset index: 0=Flat, 1=Voice, 2=Music, 3=Movie, 4=Loudness, 5-7=Custom."
      required: true
      selector:
        number:
          min: 0
          max: 7
          mode: box

set_bass:
  name: Set Bass
  description: Adjust the bass level for a specific zone.
  fields:
    entry_id:
      name: Config Entry ID
      description: The config entry ID of the amplifier (optional if only one amp).
      required: false
      selector:
        text:
    zone:
