      description: Zone index (0-5).
      required: true
      selector:
        number:
          min: 0
          max: 5
          mode: box
    value:
      name: Value
      description: Bass level in dB (-12 to 12).
      required: true
      selector:
        number:
          min: -12
          max: 12
          mode: slider

